<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Index Visualizer</title>
<style>
:root {
  --bg: #0e0e0e;
  --surface: #161616;
  --surface2: #1e1e1e;
  --border: #252525;
  --text: #a0a0a0;
  --text-dim: #404040;
  --text-bright: #e8e8e8;
  --r: 3px;
  --mono: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: var(--mono); font-size: 11px;
  background: var(--bg); color: var(--text);
  height: 100vh; display: flex; overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ─ SIDEBAR ─ */
#sidebar {
  width: 240px; flex-shrink: 0;
  background: var(--surface); border-right: 1px solid var(--border);
  overflow-y: auto; display: flex; flex-direction: column;
}
#sidebar::-webkit-scrollbar { width: 3px; }
#sidebar::-webkit-scrollbar-thumb { background: var(--border); }

.hd { padding: 15px 15px 13px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.hd-brand { font-size: 8.5px; text-transform: uppercase; letter-spacing:.2em; color:var(--text-dim); margin-bottom:3px; }
.hd-title { font-size: 13px; color: var(--text-bright); letter-spacing:-.01em; }

.sec { padding: 12px 15px; border-bottom: 1px solid var(--border); }
.sec-lbl { font-size: 8.5px; text-transform: uppercase; letter-spacing:.2em; color:var(--text-dim); margin-bottom:10px; }

.ctrl { margin-bottom: 10px; }
.ctrl:last-child { margin-bottom: 0; }
.ctrl-row { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:5px; }
.ctrl-lbl { color: var(--text); }
.ctrl-val { color: var(--text-dim); font-size: 10px; }

input[type=range] {
  -webkit-appearance: none; width:100%; height:1px;
  background: var(--border); outline: none; cursor: pointer;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none; width:8px; height:8px;
  border-radius:50%; background:var(--text-bright); cursor:pointer;
}
input[type=range]::-webkit-slider-thumb:hover { background:#fff; }

.btn-group { display: flex; gap: 4px; flex-wrap: wrap; }
.btn {
  padding: 4px 9px; background: var(--surface2);
  border: 1px solid var(--border); color: var(--text);
  font-family: var(--mono); font-size: 10px;
  border-radius: var(--r); cursor: pointer; transition: all .1s;
  text-transform: uppercase; letter-spacing:.07em;
  display: flex; align-items: center; gap: 5px;
}
.btn:hover { background:#222; border-color:#383838; color:var(--text-bright); }
.btn.active { background:var(--text-bright); border-color:var(--text-bright); color:#111; }

.cdot {
  width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
  box-shadow: 0 0 0 1px rgba(0,0,0,0.2);
}

.origin-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:3px; }
.origin-btn { aspect-ratio:1; padding:0; display:flex; align-items:center; justify-content:center; }
.dot { width:5px; height:5px; border-radius:50%; background:var(--text-dim); transition:background .1s; }
.origin-btn.active .dot { background:#111; }
.origin-btn:hover .dot { background:var(--text); }
.origin-btn.active:hover .dot { background:#000; }

.regen-sec { padding: 10px 15px; border-bottom: 1px solid var(--border); }
.regen-btn {
  width: 100%; padding: 9px 0;
  background: var(--surface2); color: var(--text);
  border: 1px solid var(--border); font-family: var(--mono);
  font-size: 10px; text-transform: uppercase; letter-spacing:.12em;
  border-radius: var(--r); cursor: pointer; transition: all .12s;
}
.regen-btn:hover { background:#222; border-color:#404040; color:var(--text-bright); }

.exp-sec { padding: 12px 15px 16px; margin-top: auto; }
.ratio-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:3px; margin-bottom:9px; }
.ratio-btn { font-size: 9.5px; }
.dl-pair { display: flex; gap: 6px; }
.dl-btn {
  flex:1; padding:9px 0; background:var(--text-bright); color:#111;
  border:none; font-family:var(--mono); font-size:10px; font-weight:600;
  text-transform:uppercase; letter-spacing:.12em;
  border-radius:var(--r); cursor:pointer; transition:background .12s;
}
.dl-btn:hover { background:#fff; }
.dl-alt { background:transparent; color:var(--text); border:1px solid var(--border); }
.dl-alt:hover { background:transparent; color:var(--text-bright); border-color:#404040; }

/* ─ CANVAS AREA ─ */
#canvas-area {
  flex:1; display:flex; align-items:center; justify-content:center;
  background:var(--bg); padding:28px; overflow:hidden;
}
#canvas-wrapper { position:relative; display:inline-flex; }
#preview-canvas { display:block; box-shadow:0 0 0 1px var(--border), 0 8px 48px rgba(0,0,0,.7); }

#canvas-below {
  position:absolute; bottom:-20px; left:0; right:0;
  display:flex; justify-content:space-between; align-items:baseline;
}
.below-label {
  font-size:9px; color:var(--text-dim); letter-spacing:.05em; white-space:nowrap;
}
</style>
</head>
<body>

<div id="sidebar">
  <div class="hd">
    <div class="hd-brand">Zeteo Search</div>
    <div class="hd-title">Index Visualizer</div>
  </div>

  <div class="sec">
    <div class="sec-lbl">Composition</div>
    <div class="ctrl">
      <div class="ctrl-row"><span class="ctrl-lbl">Origin</span></div>
      <div class="origin-grid" id="origin-grid"></div>
    </div>
    <div class="ctrl">
      <div class="ctrl-row">
        <span class="ctrl-lbl">Rotation</span>
        <span class="ctrl-val" id="rotation-val">−15°</span>
      </div>
      <input type="range" id="rotation" min="-180" max="180" value="-15" step="1">
    </div>
  </div>

  <div class="sec">
    <div class="sec-lbl">Structure</div>
    <div class="ctrl">
      <div class="ctrl-row">
        <span class="ctrl-lbl">Complexity</span>
        <span class="ctrl-val" id="complexity-val">0.40</span>
      </div>
      <input type="range" id="complexity" min="0" max="1" value="0.40" step="0.01">
    </div>
    <div class="ctrl">
      <div class="ctrl-row">
        <span class="ctrl-lbl">Gap</span>
        <span class="ctrl-val" id="gap-val">0.20</span>
      </div>
      <input type="range" id="gap" min="0.01" max="0.55" value="0.20" step="0.01">
    </div>
    <div class="ctrl">
      <div class="ctrl-row">
        <span class="ctrl-lbl">Variation</span>
        <span class="ctrl-val" id="variation-val">0.55</span>
      </div>
      <input type="range" id="variation" min="0" max="1" value="0.55" step="0.01">
    </div>
  </div>

  <div class="sec">
    <div class="sec-lbl">Color</div>
    <div class="ctrl">
      <div class="ctrl-row"><span class="ctrl-lbl">Background</span></div>
      <div class="btn-group" id="bg-group">
        <button class="btn active" data-bg="dark">Dark</button>
        <button class="btn" data-bg="light">Light</button>
        <button class="btn" data-bg="clear">Clear</button>
      </div>
    </div>
    <div class="ctrl">
      <div class="ctrl-row"><span class="ctrl-lbl">Accent</span></div>
      <div class="btn-group" id="accent-group"></div>
    </div>
    <div class="ctrl">
      <div class="ctrl-row">
        <span class="ctrl-lbl">Primary ↔ Accent</span>
        <span class="ctrl-val" id="accent-mix-val">15%</span>
      </div>
      <input type="range" id="accent-mix" min="0" max="1" value="0.15" step="0.01">
    </div>
  </div>

  <div class="regen-sec">
    <button class="regen-btn" id="regen-btn">↺  Regenerate</button>
  </div>

  <div class="exp-sec">
    <div class="sec-lbl">Export</div>
    <div class="ratio-grid" id="ratio-grid"></div>
    <div class="dl-pair">
      <button class="dl-btn" id="png-btn">↓ PNG</button>
      <button class="dl-btn dl-alt" id="svg-btn">↓ SVG</button>
    </div>
  </div>
</div>

<div id="canvas-area">
  <div id="canvas-wrapper">
    <canvas id="preview-canvas"></canvas>
    <div id="canvas-below">
      <span class="below-label" id="canvas-seed"></span>
      <span class="below-label" id="canvas-info"></span>
    </div>
  </div>
</div>

<script>
// ── PRNG ──────────────────────────────────────────────────────────────────────
function mulberry32(seed) {
  let s = (seed >>> 0) || 1;
  return function () {
    s = (s + 0x6D2B79F5) >>> 0;
    let t = Math.imul(s ^ (s >>> 15), 1 | s);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

// ── UTILS ─────────────────────────────────────────────────────────────────────
function hexToRgb(hex) {
  return [parseInt(hex.slice(1,3),16), parseInt(hex.slice(3,5),16), parseInt(hex.slice(5,7),16)];
}
function seedLabel(s) {
  return 'Seed ID: #' + String((parseInt(s,10) || 1)).padStart(6,'0');
}

// ── COLOR DATA ────────────────────────────────────────────────────────────────
// Blue is always the primary. Fills span navy → core blue → pale sky.
// Background is a saturated mid-blue so the full range has room to breathe.
const PRIMARY_BLUE = {
  bgDark:  '#00244D', // navy
  bgLight: '#D1EFFE', // light blue
  fills: [
    '#00244D',
    '#022870',
    '#083898',
    '#1040B8',
    '#244FF1',
    '#4A6EF8',
    '#7898FC',
    '#A8C4FE',
    '#D1EFFE',
  ],
};

// Accent fills: pastel versions of each accent hue, light enough to pop on blue
const ACCENTS = {
  green:  { name: 'Green',  dot: '#D2EFC8', fills: ['#D2EFC8','#B8E4B0','#9CD898','#7DC87A','#56B05A','#349640'] },
  yellow: { name: 'Yellow', dot: '#FFF9B7', fills: ['#FFF9B7','#FFF599','#FFF07A','#FFE84A','#F5D800','#D4B800'] },
  red:    { name: 'Red',    dot: '#F8CFE1', fills: ['#F8CFE1','#F4B0CC','#EE8DB4','#E56898','#D4407A','#B82060'] },
};

const ORIGINS = [
  { x:-0.10, y:-0.20 }, { x: 0.50, y:-0.30 }, { x: 1.10, y:-0.20 },
  { x:-0.30, y: 0.50 }, { x: 0.50, y: 0.50 }, { x: 1.30, y: 0.50 },
  { x:-0.10, y: 1.20 }, { x: 0.50, y: 1.30 }, { x: 1.10, y: 1.20 },
];

const RATIOS = [
  { id:'1:1',  w:1,  h:1  }, { id:'4:5',  w:4,  h:5  }, { id:'2:3',  w:2,  h:3  },
  { id:'9:16', w:9,  h:16 }, { id:'4:3',  w:4,  h:3  }, { id:'3:2',  w:3,  h:2  },
  { id:'16:9', w:16, h:9  }, { id:'3:4',  w:3,  h:4  }, { id:'5:4',  w:5,  h:4  },
];

// ── STATE ─────────────────────────────────────────────────────────────────────
const state = {
  seed: Math.floor(Math.random() * 999983),
  originIdx: 2,
  rotation: -15,
  complexity: 0.40,
  gap: 0.20,
  variation: 0.55,
  bgMode: 'dark',
  accentColor: 'green',
  accentMix: 0.15,
  ratioId: '1:1',
};

function getPalette(p) {
  return {
    bg:          p.bgMode === 'dark' ? PRIMARY_BLUE.bgDark : p.bgMode === 'light' ? PRIMARY_BLUE.bgLight : null,
    fills:       PRIMARY_BLUE.fills,
    accentFills: ACCENTS[p.accentColor].fills,
  };
}

// ── BACKGROUND BUILDER ────────────────────────────────────────────────────────
function buildBackground(p) {
  const pal = getPalette(p);
  return { bg: pal.bg };
}

// ── SCENE BUILDER ─────────────────────────────────────────────────────────────
function buildScene(p, W, H) {
  const pal    = getPalette(p);
  const origin = ORIGINS[p.originIdx];
  const ox     = origin.x * W;
  const oy     = origin.y * H;

  const maxR = Math.max(
    Math.hypot(ox,oy), Math.hypot(W-ox,oy),
    Math.hypot(ox,H-oy), Math.hypot(W-ox,H-oy)
  );

  const clx     = Math.min(Math.max(ox,0), W);
  const cly     = Math.min(Math.max(oy,0), H);
  const nearDist = Math.hypot(ox-clx, oy-cly);
  const isInside = nearDist < 0.5;
  const minR     = isInside
    ? Math.min(ox, oy, W-ox, H-oy) * 0.18
    : nearDist * 0.75 + maxR * 0.003;

  // Compressed complexity range: min ≈ 8 visible shapes, max ≈ moderate density
  const c         = p.complexity;
  const nRings    = Math.round(2 + c * 6);  // 2–8
  const nBaseSegs = Math.round(2 + c * 5);  // 2–7

  const seed  = (parseInt(p.seed,10) || 1) >>> 0;
  const rng   = mulberry32(seed);
  const gRot  = p.rotation * Math.PI / 180;
  const v     = p.variation;
  const span  = maxR - minR;
  const step  = span / nRings;
  const nFills = pal.fills.length;

  const segments = [];

  for (let i = 0; i < nRings; i++) {
    // Ring anchor — each segment gets its own thickness
    const innerR = minR + i * step;

    // Per-ring segment count
    const segVar   = Math.round((rng() - 0.5) * v * nBaseSegs * 0.6);
    const nSegs    = Math.max(2, nBaseSegs + segVar);
    const period   = (Math.PI * 2) / nSegs;

    // Per-ring base rotation — rings don't share the same start angle
    const rotOff  = (rng() - 0.5) * v * Math.PI * 0.75;
    const baseStart = gRot + rotOff;

    // Gap expressed as fraction of period
    const gapFrac = Math.min(0.80, Math.max(0.01, p.gap + (rng() - 0.5) * v * 0.08));

    // Jitter intensity scales with complexity — low complexity = more ordered shapes
    const jitterScale = 0.35 + c * 2.4;

    for (let j = 0; j < nSegs; j++) {
      // Position: even base + jitter that grows with complexity
      const baseAngle = baseStart + j * period;
      const jitter    = (rng() - 0.5) * v * period * jitterScale;
      const ss = baseAngle + jitter;

      // Width: variable, larger at low complexity (fewer, bolder shapes)
      const wMin  = 0.55 - c * 0.20; // 0.55 → 0.35
      const wSpan = 0.85 + c * 0.45; // 0.85 → 1.30
      const width = period * (wMin + rng() * wSpan) * (1 - gapFrac);
      const se    = ss + Math.max(0.015, width);

      // Per-segment radial thickness: ranges from thin slivers to chunky bands
      const segThick = step * (0.4 + rng() * 2.2);
      const rjit = step * v * 0.25;
      const ri   = Math.max(0, innerR - rng() * rjit * 0.5);
      const ro   = innerR + segThick + rng() * rjit;

      // Color: primary fills or accent fills
      const useAccent = rng() < p.accentMix;
      const ca    = useAccent ? pal.accentFills : pal.fills;
      const color = ca[Math.floor(rng() * ca.length)];

      // Opacity: more transparent overall for airy, layered look
      const opacity = 0.12 + rng() * 0.42;

      segments.push({ ri, ro, ss, se, color, opacity });
    }
  }

  return { ox, oy, segments };
}

// ── CANVAS RENDERER ───────────────────────────────────────────────────────────
function renderToCanvas(canvas, p) {
  const dpr = canvas._dpr || 1;
  const W   = canvas.width  / dpr;
  const H   = canvas.height / dpr;
  const ctx = canvas.getContext('2d');

  ctx.save();
  ctx.scale(dpr, dpr);

  const { bg }               = buildBackground(p);
  const { ox, oy, segments } = buildScene(p, W, H);

  // Solid bg (skip for transparent/clear mode)
  ctx.clearRect(0, 0, W, H);
  if (bg) {
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, W, H);
  }

  // Arc segments
  ctx.save();
  ctx.beginPath(); ctx.rect(0, 0, W, H); ctx.clip();
  for (const { ri, ro, ss, se, color, opacity } of segments) {
    const [r,g,c] = hexToRgb(color);
    ctx.fillStyle = `rgba(${r},${g},${c},${opacity.toFixed(3)})`;
    ctx.beginPath();
    ctx.arc(ox, oy, ro, ss, se);
    ctx.arc(ox, oy, ri, se, ss, true);
    ctx.closePath();
    ctx.fill();
  }
  ctx.restore();

  ctx.restore();
}

// ── SVG RENDERER ──────────────────────────────────────────────────────────────
function arcPathD(ox, oy, ri, ro, ss, se) {
  const span = se - ss;
  if (Math.abs(span) < 0.001) return null;
  if (span >= Math.PI * 1.999) {
    const mid = ss + Math.PI;
    const d1  = arcPathD(ox, oy, ri, ro, ss, mid);
    const d2  = arcPathD(ox, oy, ri, ro, mid, se);
    return d1 && d2 ? d1+' '+d2 : d1||d2;
  }
  const lg = span > Math.PI ? 1 : 0;
  const f  = v => (Math.round(v*10)/10).toFixed(1);
  const x1 = ox+ro*Math.cos(ss), y1 = oy+ro*Math.sin(ss);
  const x2 = ox+ro*Math.cos(se), y2 = oy+ro*Math.sin(se);
  const x3 = ox+ri*Math.cos(se), y3 = oy+ri*Math.sin(se);
  const x4 = ox+ri*Math.cos(ss), y4 = oy+ri*Math.sin(ss);
  return `M${f(x1)},${f(y1)} A${f(ro)},${f(ro)},0,${lg},1,${f(x2)},${f(y2)} L${f(x3)},${f(y3)} A${f(ri)},${f(ri)},0,${lg},0,${f(x4)},${f(y4)} Z`;
}

function renderToSVG(p, W, H) {
  const { bg }               = buildBackground(p);
  const { ox, oy, segments } = buildScene(p, W, H);

  const pathEls = segments.map(({ ri, ro, ss, se, color, opacity }) => {
    const d = arcPathD(ox, oy, ri, ro, ss, se);
    if (!d) return '';
    const [r,g,c] = hexToRgb(color);
    return `    <path d="${d}" fill="rgb(${r},${g},${c})" fill-opacity="${opacity.toFixed(3)}"/>`;
  }).filter(Boolean);

  return `<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">
  <defs>
    <clipPath id="bounds"><rect width="${W}" height="${H}"/></clipPath>
  </defs>
  ${bg ? `<rect width="${W}" height="${H}" fill="${bg}"/>` : ''}
  <g clip-path="url(#bounds)">
${pathEls.join('\n')}
  </g>
</svg>`;
}

// ── PREVIEW ───────────────────────────────────────────────────────────────────
const previewCanvas = document.getElementById('preview-canvas');
const canvasArea    = document.getElementById('canvas-area');
const DPR = Math.min(window.devicePixelRatio || 1, 2);

function getPreviewSize(rid) {
  const ratio  = RATIOS.find(r => r.id === rid);
  const aspect = ratio.w / ratio.h;
  const aw = canvasArea.clientWidth  - 56;
  const ah = canvasArea.clientHeight - 56;
  let w, h;
  if (aspect >= 1) { w = Math.min(aw, ah*aspect); h = w/aspect; }
  else             { h = Math.min(ah, aw/aspect); w = h*aspect; }
  if (w > aw) { w = aw; h = w/aspect; }
  if (h > ah) { h = ah; w = h*aspect; }
  return { w: Math.floor(w), h: Math.floor(h) };
}

function updatePreview() {
  const { w, h } = getPreviewSize(state.ratioId);
  previewCanvas.width  = w * DPR;
  previewCanvas.height = h * DPR;
  previewCanvas.style.width  = w + 'px';
  previewCanvas.style.height = h + 'px';
  previewCanvas._dpr = DPR;
  renderToCanvas(previewCanvas, state);
  document.getElementById('canvas-seed').textContent = seedLabel(state.seed);
  document.getElementById('canvas-info').textContent = `${state.ratioId}  ·  ${w}×${h}`;
}

// ── EXPORT ────────────────────────────────────────────────────────────────────
function exportDims() {
  const ratio = RATIOS.find(r => r.id === state.ratioId);
  const LONG  = 3000;
  const W = ratio.w >= ratio.h ? LONG : Math.round(LONG * ratio.w / ratio.h);
  const H = ratio.h >  ratio.w ? LONG : Math.round(LONG * ratio.h / ratio.w);
  return { W, H };
}
function exportName(ext) {
  const id = String(parseInt(state.seed,10)||1).padStart(6,'0');
  return `index_${id}_${state.ratioId.replace(':','-')}.${ext}`;
}
function exportPNG() {
  const { W, H } = exportDims();
  const off = document.createElement('canvas');
  off.width = W; off.height = H; off._dpr = 1;
  renderToCanvas(off, state);
  off.toBlob(blob => {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = exportName('png');
    a.click();
    setTimeout(() => URL.revokeObjectURL(a.href), 5000);
  }, 'image/png');
}
function exportSVG() {
  const { W, H } = exportDims();
  const blob = new Blob([renderToSVG(state, W, H)], { type:'image/svg+xml;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = exportName('svg');
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 5000);
}

// ── UI ────────────────────────────────────────────────────────────────────────
let renderTimer = null;
function scheduleRender() {
  clearTimeout(renderTimer);
  renderTimer = setTimeout(updatePreview, 18);
}

// Origin grid
const originGrid = document.getElementById('origin-grid');
ORIGINS.forEach((_, i) => {
  const btn = document.createElement('button');
  btn.className = 'btn origin-btn' + (i === state.originIdx ? ' active' : '');
  btn.innerHTML = '<div class="dot"></div>';
  btn.addEventListener('click', () => {
    originGrid.querySelectorAll('.origin-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.originIdx = i;
    scheduleRender();
  });
  originGrid.appendChild(btn);
});

// Rotation
document.getElementById('rotation').addEventListener('input', e => {
  state.rotation = parseInt(e.target.value);
  const v = state.rotation;
  document.getElementById('rotation-val').textContent = v < 0 ? `−${Math.abs(v)}°` : `${v}°`;
  scheduleRender();
});

// Sliders
function bindSlider(id, key, vid, fmt) {
  document.getElementById(id).addEventListener('input', e => {
    state[key] = parseFloat(e.target.value);
    document.getElementById(vid).textContent = fmt(state[key]);
    scheduleRender();
  });
}
bindSlider('complexity', 'complexity', 'complexity-val', v => v.toFixed(2));
bindSlider('gap',        'gap',        'gap-val',        v => v.toFixed(2));
bindSlider('variation',  'variation',  'variation-val',  v => v.toFixed(2));
bindSlider('accent-mix', 'accentMix',  'accent-mix-val', v => Math.round(v*100)+'%');

// Background mode
document.getElementById('bg-group').querySelectorAll('[data-bg]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-bg]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.bgMode = btn.dataset.bg;
    scheduleRender();
  });
});

// Accent color buttons (green, yellow, red)
function buildAccentButtons() {
  const grp = document.getElementById('accent-group');
  grp.innerHTML = '';
  Object.entries(ACCENTS).forEach(([key, a]) => {
    const btn = document.createElement('button');
    btn.className = 'btn' + (state.accentColor === key ? ' active' : '');
    btn.innerHTML = `<span class="cdot" style="background:${a.dot}"></span>${a.name}`;
    btn.addEventListener('click', () => {
      state.accentColor = key;
      buildAccentButtons();
      scheduleRender();
    });
    grp.appendChild(btn);
  });
}

// Regenerate
document.getElementById('regen-btn').addEventListener('click', () => {
  state.seed = Math.floor(Math.random() * 999983);
  scheduleRender();
});

// Ratio grid
const ratioGrid = document.getElementById('ratio-grid');
RATIOS.forEach(r => {
  const btn = document.createElement('button');
  btn.className = 'btn ratio-btn' + (r.id === state.ratioId ? ' active' : '');
  btn.textContent = r.id;
  btn.addEventListener('click', () => {
    ratioGrid.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.ratioId = r.id;
    scheduleRender();
  });
  ratioGrid.appendChild(btn);
});

// Export
document.getElementById('png-btn').addEventListener('click', exportPNG);
document.getElementById('svg-btn').addEventListener('click', exportSVG);

// Resize
new ResizeObserver(() => scheduleRender()).observe(canvasArea);

// Init
buildAccentButtons();
updatePreview();
</script>
</body>
</html>
